<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherX | Smart Weather Dashboard</title>

```
<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
```

</head>

<body>

<div class="overlay"></div>

<header>
    <div class="logo">
        🌦 WeatherX
    </div>

    <button id="themeToggle">🌙</button>
</header>

<main>

```
<section class="hero">

    <h1>Weather Forecast Around The World</h1>

    <p>
        Search any city and get real-time weather insights,
        forecasts, humidity, wind speed and more.
    </p>

    <div class="search-box">

        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name..."
        >

        <button id="searchBtn">
            Search
        </button>

    </div>

</section>

<section class="weather-card" id="weatherCard">

    <img
        id="weatherIcon"
        src=""
        alt="Weather Icon"
    >

    <h2 id="cityName">
        Hyderabad
    </h2>

    <h1 id="temperature">
        32°C
    </h1>

    <p id="description">
        Clear Sky
    </p>

    <div class="details">

        <div class="detail">
            <span>💧</span>
            <h3 id="humidity">60%</h3>
            <p>Humidity</p>
        </div>

        <div class="detail">
            <span>💨</span>
            <h3 id="wind">8 km/h</h3>
            <p>Wind</p>
        </div>

        <div class="detail">
            <span>🌡</span>
            <h3 id="feelsLike">34°C</h3>
            <p>Feels Like</p>
        </div>

    </div>

</section>

<section class="forecast" id="forecastContainer">

</section>
```

</main>

<script src="js/app.js"></script>

</body>
</html>
